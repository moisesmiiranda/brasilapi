spring:
  application:
    name: conectabrasilapi
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          brasilApiClient:
            connectTimeout: 3000
            readTimeout: 3000

resilience4j:
  circuitbreaker:
    instances:
      brasilApiClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
